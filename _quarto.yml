format:
  html:
    theme:
      - cosmo
    css: styles.css
    toc: true
    toc-depth: 3
    number-sections: false
    link-citations: true
    code-fold: true
    code-tools: true
    highlight-style: github
    include-in-header:
      - text: |
          <meta name="viewport" content="width=device-width, initial-scale=1" />

execute:
  echo: true
  warning: false
  message: false
  freeze: auto

bibliography: references/references.bib
